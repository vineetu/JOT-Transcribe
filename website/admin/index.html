<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jot ‚Äî Mission Control</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="64x64" href="../assets/favicon-64.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --accent: #CE231D;
  --wave: #1496F0;
  --bg: #0d0d0e;
  --panel: #161618;
  --panel-2: #1d1d20;
  --border: #2a2a2e;
  --text: #f0f0f0;
  --text-2: #9a9a9f;
  --text-3: #66666b;
  --green: #3fb950;
  --sans: 'DM Sans', -apple-system, sans-serif;
  --mono: 'DM Mono', ui-monospace, monospace;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }
a { color: inherit; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 0 20px 80px; }

header.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 0; margin-bottom: 28px; border-bottom: 1px solid var(--border);
}
.topbar .brand { display: flex; align-items: baseline; gap: 10px; }
.topbar .brand .wordmark { font-weight: 600; font-size: 1.35rem; color: var(--text); letter-spacing: -0.01em; line-height: 1; }
.topbar .brand .jg { position: relative; display: inline-block; }
.topbar .brand .wv {
  position: absolute; left: 50%; transform: translateX(-50%);
  top: -0.01em; width: 0.07em; height: 0.21em;
  border-radius: 0.06em; background: linear-gradient(180deg, #3AA6F8, #0085E1);
}
.topbar .brand .wv::before, .topbar .brand .wv::after {
  content: ''; position: absolute; top: 0.055em; width: 0.07em; height: 0.13em;
  border-radius: 0.06em; background: linear-gradient(180deg, #3AA6F8, #0085E1);
}
.topbar .brand .wv::before { left: -0.12em; }
.topbar .brand .wv::after { right: -0.12em; }
.topbar .brand span.tag { color: var(--text-3); font-size: 0.85rem; }
.topbar a.site { font-size: 0.82rem; color: var(--text-2); text-decoration: none; }
.topbar a.site:hover { color: var(--text); }
.topbar .right { display: flex; align-items: baseline; gap: 16px; }
.topbar .date { font-size: 0.82rem; color: var(--text-3); }

nav.tabs { display: flex; gap: 6px; margin-bottom: 8px; }
.tabs button {
  background: transparent; border: 1px solid transparent; color: var(--text-2);
  font-family: var(--sans); font-size: 0.85rem; font-weight: 600;
  padding: 7px 16px; border-radius: 999px; cursor: pointer;
}
.tabs button:hover { color: var(--text); }
.tabs button.active { background: var(--panel); border-color: var(--border); color: var(--text); }
.section-sub { font-size: 0.8rem; color: var(--text-3); margin: 0 4px 16px; line-height: 1.5; }

.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 14px; }
.panel {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 20px;
}
.panel h2 {
  font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.panel h2 .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.stat .big { font-family: var(--mono); font-size: 1.9rem; font-weight: 500; line-height: 1.1; }
.stat .sub { font-size: 0.78rem; color: var(--text-2); margin-top: 4px; }
.stat .delta { color: var(--green); }

.cols { display: grid; grid-template-columns: 1.2fr 1fr; gap: 14px; align-items: start; }
@media (max-width: 880px) { .grid { grid-template-columns: repeat(2, 1fr); } .cols { grid-template-columns: 1fr; } }

table.releases { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
table.releases th { text-align: left; color: var(--text-3); font-weight: 500; font-size: 0.75rem; padding: 6px 8px; border-bottom: 1px solid var(--border); }
table.releases td { padding: 8px; border-bottom: 1px solid var(--border); }
table.releases tr:last-child td { border-bottom: none; }
table.releases .num { font-family: var(--mono); text-align: right; }
table.releases .bar { height: 4px; background: var(--panel-2); border-radius: 2px; overflow: hidden; margin-top: 5px; }
table.releases .bar i { display: block; height: 100%; background: var(--accent); border-radius: 2px; }

textarea, input[type=text], select {
  width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px;
  color: var(--text); font-family: var(--sans); font-size: 0.9rem; padding: 10px 12px;
  outline: none; resize: vertical;
}
textarea:focus, input:focus, select:focus { border-color: #4a4a50; }
textarea { min-height: 130px; line-height: 1.55; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--text); color: #111; border: none; border-radius: 8px;
  padding: 8px 14px; font-family: var(--sans); font-size: 0.82rem; font-weight: 600;
  cursor: pointer; text-decoration: none; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn.ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); font-weight: 500; }
.btn.ghost:hover { color: var(--text); opacity: 1; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

.utm {
  font-family: var(--mono); font-size: 0.74rem; color: var(--text-2);
  background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 10px; margin-top: 10px; word-break: break-all; cursor: pointer;
}
.utm:hover { color: var(--text); }
.hint { font-size: 0.75rem; color: var(--text-3); margin-top: 10px; line-height: 1.5; }
.hint a { color: var(--text-2); }

.drafts { list-style: none; margin-top: 14px; }
.drafts li {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px;
  font-size: 0.8rem; color: var(--text-2); cursor: pointer;
}
.drafts li:hover { color: var(--text); background: var(--panel-2); }
.drafts li .x { color: var(--text-3); cursor: pointer; padding: 0 4px; }
.drafts li .x:hover { color: var(--accent); }

/* LinkedIn card preview */
.li-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 12px; background: #fff; }
.li-card img { display: block; width: 100%; }
.li-card .meta { padding: 10px 14px; background: #f3f2ef; }
.li-card .meta .t { color: #1d1d1f; font-size: 0.88rem; font-weight: 600; line-height: 1.3; }
.li-card .meta .d { color: #666; font-size: 0.74rem; margin-top: 2px; }

.checklist { list-style: none; font-size: 0.82rem; color: var(--text-2); }
.checklist li { display: flex; gap: 9px; padding: 5px 0; align-items: baseline; }
.checklist li::before { content: '‚Üí'; color: var(--accent); flex: none; }
.checklist a { color: var(--text); }

/* Publish calendar */
.cal { list-style: none; font-size: 0.82rem; }
.cal li { display: flex; gap: 10px; padding: 7px 10px; border-radius: 8px; align-items: baseline; border: 1px solid transparent; }
.cal li.today { background: var(--panel-2); border-color: var(--border); }
.cal .day { width: 36px; flex: none; color: var(--text-3); font-family: var(--mono); font-size: 0.74rem; }
.cal li.today .day { color: var(--accent); }
.cal .ch { font-weight: 600; }
.cal .ch.off { font-weight: 400; color: var(--text-2); }
.cal .win { color: var(--text-2); margin-left: auto; font-family: var(--mono); font-size: 0.74rem; white-space: nowrap; }

/* Agent brief */
.brief-meta { font-family: var(--mono); font-size: 0.74rem; color: var(--text-2); margin-bottom: 10px; }
.brief-draft { background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; font-size: 0.86rem; white-space: pre-wrap; line-height: 1.55; }
.opp { border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; margin-top: 8px; font-size: 0.8rem; }
.opp .t a { color: var(--text); font-weight: 600; text-decoration: none; }
.opp .t a:hover { text-decoration: underline; }
.opp .why { color: var(--text-2); margin-top: 2px; }
.opp details { margin-top: 6px; }
.opp summary { cursor: pointer; color: var(--text-3); font-size: 0.75rem; }
.opp .reply { white-space: pre-wrap; color: var(--text-2); margin-top: 6px; background: var(--panel-2); border-radius: 6px; padding: 8px 10px; }
.notes { font-size: 0.8rem; color: var(--text-2); margin-top: 12px; border-left: 2px solid var(--accent); padding-left: 10px; }

.err { color: #f08080; font-size: 0.82rem; }
.loading { color: var(--text-3); font-size: 0.82rem; }
.spacer { height: 14px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import htm from 'https://esm.sh/htm';

const h = htm.bind(React.createElement);
const REPO = 'vineetu/JOT-Transcribe';
const SITE = 'https://jot-transcribe.com/';

// ‚îÄ‚îÄ GitHub metrics ‚îÄ‚îÄ
function useGitHub() {
  const [data, setData] = useState({ loading: true });
  useEffect(() => {
    Promise.all([
      fetch(`https://api.github.com/repos/${REPO}`).then(r => r.json()),
      fetch(`https://api.github.com/repos/${REPO}/releases?per_page=30`).then(r => r.json()),
    ]).then(([repo, releases]) => {
      if (!Array.isArray(releases)) throw new Error(releases.message || repo.message || 'GitHub API error');
      const rows = releases.map(r => ({
        tag: r.tag_name,
        date: (r.published_at || '').slice(0, 10),
        downloads: (r.assets || []).reduce((s, a) => s + (a.download_count || 0), 0),
      }));
      setData({
        loading: false,
        stars: repo.stargazers_count,
        forks: repo.forks_count,
        watchers: repo.subscribers_count,
        latest: rows[0],
        total: rows.reduce((s, r) => s + r.downloads, 0),
        rows,
      });
    }).catch(e => setData({ loading: false, error: String(e.message || e) }));
  }, []);
  return data;
}

// ‚îÄ‚îÄ Marketing agent data (committed daily to marketing/data/ by the cloud routine) ‚îÄ‚îÄ
const RAW = `https://raw.githubusercontent.com/${REPO}/main/marketing/data/`;
function useMarketing() {
  const [data, setData] = useState({ loading: true });
  useEffect(() => {
    const get = f => fetch(RAW + f, { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null);
    Promise.all([get('snapshots.json'), get('brief.json')])
      .then(([snaps, brief]) => setData({ loading: false, snaps, brief }));
  }, []);
  return data;
}

function paceFrom(snaps) {
  if (!Array.isArray(snaps) || snaps.length < 2) return null;
  const last = snaps[snaps.length - 1];
  const base = snaps[Math.max(0, snaps.length - 8)];
  const days = Math.max(1, (Date.parse(last.date) - Date.parse(base.date)) / 86400000);
  return (last.total - base.total) / days;
}

function Stat({ label, value, sub }) {
  return h`<div class="panel stat">
    <h2><span class="dot"></span>${label}</h2>
    <div class="big">${value ?? '‚Äî'}</div>
    ${sub && h`<div class="sub">${sub}</div>`}
  </div>`;
}

function Releases({ gh }) {
  if (gh.loading) return h`<div class="panel"><h2>Downloads by release</h2><div class="loading">Loading from GitHub‚Ä¶</div></div>`;
  if (gh.error) return h`<div class="panel"><h2>Downloads by release</h2><div class="err">${gh.error}</div></div>`;
  const max = Math.max(1, ...gh.rows.map(r => r.downloads));
  return h`<div class="panel">
    <h2><span class="dot"></span>Downloads by release</h2>
    <table class="releases">
      <thead><tr><th>Release</th><th>Date</th><th style=${{textAlign:'right'}}>DMG downloads</th></tr></thead>
      <tbody>
        ${gh.rows.map(r => h`<tr key=${r.tag}>
          <td>${r.tag}<div class="bar"><i style=${{ width: (100 * r.downloads / max) + '%' }}></i></div></td>
          <td style=${{color:'var(--text-2)'}}>${r.date}</td>
          <td class="num">${r.downloads.toLocaleString()}</td>
        </tr>`)}
      </tbody>
    </table>
    <div class="hint">Live from the GitHub API ‚Äî every DMG pulled through the website lands here. Tag releases with UTM-tracked posts to attribute spikes.</div>
  </div>`;
}

// ‚îÄ‚îÄ Agent brief ‚îÄ‚îÄ
function loadDraft(d) {
  localStorage.setItem('jot-draft-live', d.text);
  window.dispatchEvent(new CustomEvent('jot-load-draft', { detail: d }));
}

function AgentBrief({ m }) {
  let body;
  if (m.loading) {
    body = h`<div class="loading">Loading agent data‚Ä¶</div>`;
  } else if (!m.brief) {
    body = h`<div class="hint" style=${{ marginTop: 0 }}>
      No brief yet. The marketing agent runs every morning at <b>5:30am PT</b> ‚Äî it snapshots
      downloads, sweeps Reddit/HN for threads worth answering, writes ready-to-post content for
      LinkedIn, X, Reddit, and Instagram, and commits it all to <code>marketing/data/brief.json</code>.
      This panel reads that file live, and the same brief lands in your Gmail drafts.
      Nothing is ever posted without you.
    </div>`;
  } else {
    const b = m.brief;
    const dl = b.downloads || {};
    const posts = b.drafts || (b.draft ? [b.draft] : []);
    body = h`<div>
      <div class="brief-meta">${b.date} ¬∑ +${dl.delta ?? 0} downloads ¬∑ pace ${dl.avg7 ?? '‚Äî'}/day ¬∑ goal ${dl.goal ?? 100}/day</div>
      ${posts.length === 0 && h`<div class="hint" style=${{ marginTop: 0 }}>No posts today ‚Äî work the opportunities below.</div>`}
      ${posts.map((d, i) => h`<div key=${d.channel || i} style=${{ marginTop: i ? '16px' : 0 }}>
        <div class="brief-meta" style=${{ marginBottom: '6px' }}>
          ${CHANNELS[d.channel]?.name || d.channel} ¬∑ publish ${d.publish_window_pt}${d.recommended === false ? ' ¬∑ hold today' : ''}
        </div>
        <div class="brief-draft">${d.text}</div>
        <div class="btn-row">
          <button class="btn" onClick=${() => loadDraft(d)}>Load into composer ‚Üí</button>
        </div>
        ${d.visual && h`<div class="hint">Visual: ${d.visual}</div>`}
        ${d.note && h`<div class="hint">${d.note}</div>`}
      </div>`)}
      ${(b.opportunities || []).map((o, i) => h`<div class="opp" key=${i}>
        <div class="t"><a href=${o.url} target="_blank" rel="noopener">${o.title}</a></div>
        <div class="why">${o.why}</div>
        ${o.suggested_reply && h`<details><summary>Suggested reply</summary><div class="reply">${o.suggested_reply}</div></details>`}
      </div>`)}
      ${(b.outreach || []).map((o, i) => h`<div class="opp" key=${'out' + i}>
        <div class="t"><a href=${o.url} target="_blank" rel="noopener">${o.target}</a> <span style=${{ color: 'var(--text-3)', fontWeight: 400 }}>¬∑ press/creator outreach</span></div>
        <div class="why">${o.why}${o.contact ? ` ¬∑ ${o.contact}` : ''}</div>
        ${o.pitch && h`<details><summary>Pitch draft (also in your Gmail drafts)</summary><div class="reply">${o.pitch}</div></details>`}
      </div>`)}
      ${b.notes && h`<div class="notes">${b.notes}</div>`}
    </div>`;
  }
  return h`<div class="panel"><h2><span class="dot"></span>${"Today's brief ‚Äî from the agent"}</h2>${body}</div>`;
}

// ‚îÄ‚îÄ Publish calendar ‚îÄ‚îÄ
const WINDOWS = [
  { ch: 'LinkedIn', win: '7:00‚Äì8:30am PT', pace: 'daily ok ¬∑ Tue‚ÄìThu strongest' },
  { ch: 'X', win: '6:30‚Äì9:00am PT', pace: 'daily ok' },
  { ch: 'Reddit', win: '6:00‚Äì8:00am PT', pace: 'max 1‚Äì2√ó/week per subreddit' },
  { ch: 'Instagram', win: '11am‚Äì1pm PT', pace: '2‚Äì3 Reels/week ¬∑ link in bio' },
];

function PublishCalendar() {
  return h`<div class="panel">
    <h2><span class="dot"></span>Publish windows</h2>
    <ul class="cal">
      ${WINDOWS.map(w => h`<li key=${w.ch}>
        <span class="ch">${w.ch}</span>
        <span style=${{ color: 'var(--text-3)', fontSize: '0.75rem' }}>${w.pace}</span>
        <span class="win">${w.win}</span>
      </li>`)}
    </ul>
    <div class="hint">
      Fresh posts for all four channels land in the brief every morning at 5:30am PT ‚Äî you pick which
      to publish. Windows are Pacific, picked so one post hits every timezone that matters: a 7am PT
      post is 10am New York and 3pm London ‚Äî the US-morning + EU-afternoon overlap where feeds peak ‚Äî
      and it's still near the top when Asia wakes up. Respect the Reddit pace: subreddits ban
      accounts that post promo daily. Hacker News (Show HN) is reserved for major releases; the
      agent flags those days in the brief.
    </div>
  </div>`;
}

// ‚îÄ‚îÄ Durable channels ‚îÄ‚îÄ
const KIT = `https://github.com/${REPO}/blob/main/marketing/distribution/`;
const DURABLE = [
  { k: 'brew', label: 'Homebrew tap ‚Äî brew install --cask jamyc3/jot/jot', doc: 'homebrew.md', note: 'live ‚Äî add the one-liner to README + website' },
  { k: 'alt', label: 'AlternativeTo listing', doc: 'alternativeto.md', note: '20 min ‚Äî copy is ready to paste' },
  { k: 'mu', label: 'MacUpdate listing', doc: 'macupdate.md', note: '20 min ‚Äî copy is ready to paste' },
  { k: 'awesome', label: 'awesome-mac + open-source-mac-apps PRs', doc: 'README.md', note: 'one-line PRs' },
  { k: 'ph', label: 'Product Hunt launch', doc: 'product-hunt.md', note: 'gated: needs demo video + analytics first' },
];

function Durable() {
  const [done, setDone] = useState(() => JSON.parse(localStorage.getItem('jot-durable') || '{}'));
  const toggle = k => { const d = { ...done, [k]: !done[k] }; setDone(d); localStorage.setItem('jot-durable', JSON.stringify(d)); };
  const n = DURABLE.filter(d => done[d.k]).length;
  return h`<div class="panel">
    <h2><span class="dot"></span>Durable channels ¬∑ ${n}/${DURABLE.length}</h2>
    <ul class="checklist" style=${{ listStyle: 'none' }}>
      ${DURABLE.map(d => h`<li key=${d.k} style=${{ alignItems: 'center' }}>
        <input type="checkbox" style=${{ width: 'auto' }} checked=${!!done[d.k]} onChange=${() => toggle(d.k)} />
        <span style=${{ textDecoration: done[d.k] ? 'line-through' : 'none', color: done[d.k] ? 'var(--text-3)' : 'var(--text-2)' }}>
          ${d.label} <a href=${KIT + d.doc} target="_blank" rel="noopener">kit ‚Üí</a>
          <span style=${{ color: 'var(--text-3)', fontSize: '0.75rem' }}> ¬∑ ${d.note}</span>
        </span>
      </li>`)}
    </ul>
    <div class="hint">These compound ‚Äî unlike posts, a listing from today still delivers downloads next year.
    Most of the road to 100/day runs through this list, not the feed.</div>
  </div>`;
}

// ‚îÄ‚îÄ Reach playbook ‚îÄ‚îÄ
const PLAYBOOK = [
  { ch: 'Everywhere', rules: 'The first 30‚Äì60 minutes decide reach on every platform. Post inside the window, then stay and reply to every comment for an hour ‚Äî early engagement velocity is the #1 ranking signal everywhere.' },
  { ch: 'LinkedIn', rules: 'External links are downranked 2‚Äì4x: post text-only, put the UTM link in the FIRST COMMENT. Line breaks + a hook first line drive dwell time, which is what LinkedIn ranks. ‚â§3 hashtags.' },
  { ch: 'X', rules: 'Links in the main post are downranked: tweet text/video only, put the link in the first reply. Native video gets ~3x reach. Replies and bookmarks weigh more than likes.' },
  { ch: 'Reddit', rules: 'No follower count ‚Äî every post starts equal, so this is the best zero-audience channel. Text post (not link post), honest title, "I built this" framing. The first-hour upvote ratio decides everything; answer every comment. Keep a 9:1 ratio of normal participation to self-promo.' },
  { ch: 'Instagram', rules: 'Reels only ‚Äî static images of a desktop app go nowhere. Hook in the first 3 seconds, trending audio, watch-through rate is the algorithm. Caption links don‚Äôt work: UTM link lives in bio.' },
  { ch: 'Hacker News', rules: '"Show HN: ‚Ä¶" title format, Tue‚ÄìThu 6‚Äì8am ET. Post, then immediately add a first comment with the backstory. NEVER ask anyone to upvote ‚Äî HN detects voting rings and buries the post.' },
];

function Playbook() {
  return h`<div class="panel">
    <h2><span class="dot"></span>Reach playbook</h2>
    ${PLAYBOOK.map(p => h`<div class="opp" key=${p.ch} style=${{ marginTop: '8px' }}>
      <div class="t" style=${{ fontWeight: 600 }}>${p.ch}</div>
      <div class="why">${p.rules}</div>
    </div>`)}
    <div class="hint">
      Paid "boost" buttons (LinkedIn Boost, Instagram Promote, Reddit ads) are usually a bad deal for
      a free dev tool ‚Äî you pay per impression for an audience that mostly isn't on a Mac with Apple
      Silicon. The mechanics above plus creator/press outreach beat paid reach at this stage.
    </div>
  </div>`;
}

// ‚îÄ‚îÄ Composer ‚îÄ‚îÄ
const CHANNELS = {
  linkedin: { name: 'LinkedIn', share: u => `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(u)}` },
  x:        { name: 'X', share: (u, t) => `https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}&url=${encodeURIComponent(u)}` },
  reddit:   { name: 'Reddit', share: (u, t) => `https://www.reddit.com/submit?url=${encodeURIComponent(u)}&title=${encodeURIComponent(t.split('\n')[0])}` },
  hn:       { name: 'Hacker News', share: (u, t) => `https://news.ycombinator.com/submitlink?u=${encodeURIComponent(u)}&t=${encodeURIComponent(t.split('\n')[0])}` },
  instagram:{ name: 'Instagram', share: () => 'https://www.instagram.com/' },
};

function Composer() {
  const [text, setText] = useState(localStorage.getItem('jot-draft-live') || '');
  const [channel, setChannel] = useState('linkedin');
  const [campaign, setCampaign] = useState('launch');
  const [drafts, setDrafts] = useState(() => JSON.parse(localStorage.getItem('jot-drafts') || '[]'));
  const [copied, setCopied] = useState(false);

  useEffect(() => { localStorage.setItem('jot-draft-live', text); }, [text]);
  const saveDrafts = d => { setDrafts(d); localStorage.setItem('jot-drafts', JSON.stringify(d)); };

  useEffect(() => {
    const fn = e => {
      const d = e.detail;
      setText(d.text);
      if (CHANNELS[d.channel]) setChannel(d.channel);
      const m = (d.utm_url || '').match(/utm_campaign=([^&\s]+)/);
      if (m) setCampaign(m[1]);
    };
    window.addEventListener('jot-load-draft', fn);
    return () => window.removeEventListener('jot-load-draft', fn);
  }, []);

  const utm = useMemo(() => {
    const c = campaign.trim().toLowerCase().replace(/\s+/g, '-') || 'launch';
    return `${SITE}?utm_source=${channel}&utm_medium=social&utm_campaign=${c}`;
  }, [channel, campaign]);

  const ch = CHANNELS[channel];
  const copy = s => navigator.clipboard.writeText(s).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });

  return h`<div class="panel">
    <h2><span class="dot"></span>${'Compose & publish'}</h2>
    <textarea value=${text} onInput=${e => setText(e.target.value)}
      placeholder="Write the post in your own voice. Specifics beat slogans ‚Äî '$0, runs on the Neural Engine, MIT licensed' beats 'effortless AI dictation'."></textarea>
    <div class="btn-row">
      <select style=${{ width: 'auto' }} value=${channel} onChange=${e => setChannel(e.target.value)}>
        ${Object.entries(CHANNELS).map(([k, v]) => h`<option key=${k} value=${k}>${v.name}</option>`)}
      </select>
      <input type="text" style=${{ width: '130px' }} value=${campaign} onInput=${e => setCampaign(e.target.value)} title="utm_campaign" />
      <button class="btn ghost" onClick=${() => copy(text + '\n\n' + utm)}>${copied ? 'Copied ‚úì' : 'Copy post + link'}</button>
      <a class="btn" href=${ch.share(utm, text)} target="_blank" rel="noopener">Open in ${ch.name} ‚Üí</a>
      <button class="btn ghost" onClick=${() => text.trim() && saveDrafts([{ t: text, when: new Date().toISOString().slice(0, 10) }, ...drafts])}>Save draft</button>
    </div>
    <div class="utm" title="Click to copy" onClick=${() => copy(utm)}>${utm}</div>
    <div class="hint">The share dialog opens pre-filled ‚Äî you review and hit Post yourself, from your own account. UTM tags let the traffic panel attribute each post.</div>
    ${drafts.length > 0 && h`<ul class="drafts">
      ${drafts.map((d, i) => h`<li key=${i} onClick=${() => setText(d.t)}>
        <span>${d.t.slice(0, 70)}${d.t.length > 70 ? '‚Ä¶' : ''} <span style=${{color:'var(--text-3)'}}>¬∑ ${d.when}</span></span>
        <span class="x" onClick=${e => { e.stopPropagation(); saveDrafts(drafts.filter((_, j) => j !== i)); }}>‚úï</span>
      </li>`)}
    </ul>`}
  </div>`;
}

// ‚îÄ‚îÄ LinkedIn preview ‚îÄ‚îÄ
function CardPreview() {
  return h`<div class="panel">
    <h2><span class="dot"></span>LinkedIn card preview</h2>
    <div class="li-card">
      <img src="../assets/og-card.png" alt="OG card" />
      <div class="meta">
        <div class="t">Jot ‚Äî Speak, and it's written.</div>
        <div class="d">jot-transcribe.com</div>
      </div>
    </div>
    <div class="hint">
      This is what a shared link renders as. LinkedIn caches it ~7 days ‚Äî before the first
      real post, force a refresh in the <a href="https://www.linkedin.com/post-inspector/" target="_blank" rel="noopener">Post Inspector</a>.
      If the card image ever changes, version the filename (og-card-v2.png).
    </div>
  </div>`;
}

// ‚îÄ‚îÄ Traffic ‚îÄ‚îÄ
function Traffic() {
  const code = localStorage.getItem('jot-gc-code') || '';
  const [val, setVal] = useState(code);
  const [saved, setSaved] = useState(!!code);
  if (saved && val) {
    return h`<div class="panel">
      <h2><span class="dot"></span>Site traffic</h2>
      <iframe src=${`https://${val}.goatcounter.com`} style=${{ width: '100%', height: '420px', border: '1px solid var(--border)', borderRadius: '9px', background: '#fff' }}></iframe>
      <div class="hint"><span style=${{cursor:'pointer'}} onClick=${() => { localStorage.removeItem('jot-gc-code'); location.reload(); }}>Change site code</span></div>
    </div>`;
  }
  return h`<div class="panel">
    <h2><span class="dot"></span>Site traffic ‚Äî not wired up yet</h2>
    <ul class="checklist">
      <li>Create a free account at <a href="https://www.goatcounter.com" target="_blank" rel="noopener">goatcounter.com</a> (privacy-first: no cookies, no personal data, open source).</li>
      <li>Uncomment the GoatCounter script at the bottom of the public index.html and drop in your site code.</li>
      <li>Enter the same code here to embed the dashboard:</li>
    </ul>
    <div class="btn-row">
      <input type="text" style=${{ width: '200px' }} placeholder="your-site-code" value=${val} onInput=${e => setVal(e.target.value)} />
      <button class="btn" onClick=${() => { if (val.trim()) { localStorage.setItem('jot-gc-code', val.trim()); setSaved(true); } }}>Connect</button>
    </div>
    <div class="hint">Until then, GitHub download counts (left) are the ground-truth metric ‚Äî every install is one DMG download.</div>
  </div>`;
}

const TABS = {
  today: {
    label: 'Today',
    sub: "Your 10-minute morning: read the agent's brief, load a draft into the composer, post it inside its window ‚Äî then stay and answer comments for an hour.",
  },
  growth: {
    label: 'Growth',
    sub: 'The compounding layer: one-time channel setups that keep delivering, and the platform mechanics that make posts travel.',
  },
  analytics: {
    label: 'Analytics',
    sub: 'Where downloads actually come from ‚Äî per-release pulls and UTM-attributed site traffic.',
  },
};

function App() {
  const gh = useGitHub();
  const mk = useMarketing();
  const pace = paceFrom(mk.snaps);
  const stored = localStorage.getItem('jot-mc-tab');
  const [tab, setTab] = useState(TABS[stored] ? stored : 'today');
  const go = t => { setTab(t); localStorage.setItem('jot-mc-tab', t); };
  const today = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });

  return h`<div class="wrap">
    <header class="topbar">
      <div class="brand">
        <span class="wordmark"><span class="jg">»∑<span class="wv"></span></span>ot</span> <span class="tag">Mission Control</span>
      </div>
      <div class="right">
        <span class="date">${today}</span>
        <a class="site" href="../index.html">View public site ‚Üí</a>
      </div>
    </header>

    <div class="grid">
      <${Stat} label="Total downloads" value=${gh.loading ? '‚Ä¶' : gh.error ? '‚Äî' : gh.total?.toLocaleString()} sub="all releases, via GitHub" />
      <${Stat} label="Pace to goal" value=${mk.loading ? '‚Ä¶' : pace == null ? '‚Äî' : pace.toFixed(1) + '/day'}
        sub=${pace == null ? 'live after the agent‚Äôs first 2 runs' : Math.round(pace) + '% of the 100/day goal, 7-day avg'} />
      <${Stat} label="Latest release" value=${gh.latest?.tag ?? '‚Ä¶'} sub=${gh.latest ? `${gh.latest.downloads.toLocaleString()} downloads since ${gh.latest.date}` : ''} />
      <${Stat} label="GitHub stars" value=${gh.loading ? '‚Ä¶' : gh.stars?.toLocaleString()} sub=${gh.forks != null ? `${gh.forks} forks` : ''} />
    </div>

    <nav class="tabs">
      ${Object.entries(TABS).map(([k, t]) => h`<button key=${k} class=${tab === k ? 'active' : ''} onClick=${() => go(k)}>${t.label}</button>`)}
    </nav>
    <div class="section-sub">${TABS[tab].sub}</div>

    ${tab === 'today' && h`<div class="cols">
      <div>
        <${AgentBrief} m=${mk} />
      </div>
      <div>
        <${Composer} />
        <div class="spacer"></div>
        <${PublishCalendar} />
      </div>
    </div>`}

    ${tab === 'growth' && h`<div class="cols">
      <div>
        <${Durable} />
        <div class="spacer"></div>
        <${CardPreview} />
      </div>
      <div>
        <${Playbook} />
      </div>
    </div>`}

    ${tab === 'analytics' && h`<div class="cols">
      <div>
        <${Releases} gh=${gh} />
      </div>
      <div>
        <${Traffic} />
      </div>
    </div>`}
  </div>`;
}

createRoot(document.getElementById('root')).render(h`<${App} />`);
</script>
</body>
</html>
