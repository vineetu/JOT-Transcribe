<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jot — Mission Control</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="64x64" href="../assets/favicon-64.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --accent: #CE231D;
  --wave: #1496F0;
  --bg: #f6f5f3;
  --panel: #ffffff;
  --panel-2: #f1f0ee;
  --border: #e4e3e0;
  --text: #1d1d1f;
  --text-2: #6e6e73;
  --text-3: #9d9da2;
  --green: #1f883d;
  --btn-fg: #ffffff;
  --sans: 'DM Sans', -apple-system, sans-serif;
  --mono: 'DM Mono', ui-monospace, monospace;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }
a { color: inherit; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 0 20px 80px; }

header.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 0; margin-bottom: 28px; border-bottom: 1px solid var(--border);
}
.topbar .brand { display: flex; align-items: baseline; gap: 10px; }
.topbar .brand .wordmark { font-weight: 600; font-size: 1.35rem; color: var(--text); letter-spacing: -0.01em; line-height: 1; }
.topbar .brand .jg { position: relative; display: inline-block; }
.topbar .brand .wv {
  position: absolute; left: 76%; transform: translateX(-50%);
  top: 0.07em; width: 0.07em; height: 0.21em;
  border-radius: 0.06em; background: linear-gradient(180deg, #3AA6F8, #0085E1);
}
.topbar .brand .wv::before, .topbar .brand .wv::after {
  content: ''; position: absolute; top: 0.055em; width: 0.07em; height: 0.13em;
  border-radius: 0.06em; background: linear-gradient(180deg, #3AA6F8, #0085E1);
}
.topbar .brand .wv::before { left: -0.12em; }
.topbar .brand .wv::after { right: -0.12em; }
.topbar .brand span.tag { color: var(--text-3); font-size: 0.85rem; }
.topbar a.site { font-size: 0.82rem; color: var(--text-2); text-decoration: none; }
.topbar a.site:hover { color: var(--text); }
.topbar .right { display: flex; align-items: baseline; gap: 16px; }
.topbar .date { font-size: 0.82rem; color: var(--text-3); }

nav.tabs { display: flex; gap: 6px; margin-bottom: 8px; }
.tabs button {
  background: transparent; border: 1px solid transparent; color: var(--text-2);
  font-family: var(--sans); font-size: 0.85rem; font-weight: 600;
  padding: 7px 16px; border-radius: 999px; cursor: pointer;
}
.tabs button:hover { color: var(--text); }
.tabs button.active { background: var(--panel); border-color: var(--border); color: var(--text); }
.section-sub { font-size: 0.8rem; color: var(--text-3); margin: 0 4px 16px; line-height: 1.5; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(165px, 1fr)); gap: 14px; margin-bottom: 14px; }
.panel {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.panel h2 {
  font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.panel h2 .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.stat .big { font-family: var(--mono); font-size: 1.9rem; font-weight: 500; line-height: 1.1; }
.stat .sub { font-size: 0.78rem; color: var(--text-2); margin-top: 4px; }
.stat .delta { color: var(--green); }

.cols { display: grid; grid-template-columns: 1.2fr 1fr; gap: 14px; align-items: start; }
@media (max-width: 880px) { .grid { grid-template-columns: repeat(2, 1fr); } .cols { grid-template-columns: 1fr; } }

table.releases { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
table.releases th { text-align: left; color: var(--text-3); font-weight: 500; font-size: 0.75rem; padding: 6px 8px; border-bottom: 1px solid var(--border); }
table.releases td { padding: 8px; border-bottom: 1px solid var(--border); }
table.releases tr:last-child td { border-bottom: none; }
table.releases .num { font-family: var(--mono); text-align: right; }
table.releases .bar { height: 4px; background: var(--panel-2); border-radius: 2px; overflow: hidden; margin-top: 5px; }
table.releases .bar i { display: block; height: 100%; background: var(--accent); border-radius: 2px; }

textarea, input[type=text], select {
  width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px;
  color: var(--text); font-family: var(--sans); font-size: 0.9rem; padding: 10px 12px;
  outline: none; resize: vertical;
}
textarea:focus, input:focus, select:focus { border-color: #4a4a50; }
textarea { min-height: 130px; line-height: 1.55; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--text); color: var(--btn-fg); border: none; border-radius: 8px;
  padding: 8px 14px; font-family: var(--sans); font-size: 0.82rem; font-weight: 600;
  cursor: pointer; text-decoration: none; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn.ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); font-weight: 500; }
.btn.ghost:hover { color: var(--text); opacity: 1; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

.utm {
  font-family: var(--mono); font-size: 0.74rem; color: var(--text-2);
  background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 10px; margin-top: 10px; word-break: break-all; cursor: pointer;
}
.utm:hover { color: var(--text); }
.hint { font-size: 0.75rem; color: var(--text-3); margin-top: 10px; line-height: 1.5; }
.hint a { color: var(--text-2); }

.drafts { list-style: none; margin-top: 14px; }
.drafts li {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px;
  font-size: 0.8rem; color: var(--text-2); cursor: pointer;
}
.drafts li:hover { color: var(--text); background: var(--panel-2); }
.drafts li .x { color: var(--text-3); cursor: pointer; padding: 0 4px; }
.drafts li .x:hover { color: var(--accent); }

/* LinkedIn card preview */
.li-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 12px; background: #fff; }
.li-card img { display: block; width: 100%; }
.li-card .meta { padding: 10px 14px; background: #f3f2ef; }
.li-card .meta .t { color: #1d1d1f; font-size: 0.88rem; font-weight: 600; line-height: 1.3; }
.li-card .meta .d { color: #666; font-size: 0.74rem; margin-top: 2px; }

.checklist { list-style: none; font-size: 0.82rem; color: var(--text-2); }
.checklist li { display: flex; gap: 9px; padding: 5px 0; align-items: baseline; }
.checklist li::before { content: '→'; color: var(--accent); flex: none; }
.checklist a { color: var(--text); }

/* Publish calendar */
.cal { list-style: none; font-size: 0.82rem; }
.cal li { display: flex; gap: 10px; padding: 7px 10px; border-radius: 8px; align-items: baseline; border: 1px solid transparent; }
.cal li.today { background: var(--panel-2); border-color: var(--border); }
.cal .day { width: 36px; flex: none; color: var(--text-3); font-family: var(--mono); font-size: 0.74rem; }
.cal li.today .day { color: var(--accent); }
.cal .ch { font-weight: 600; }
.cal .ch.off { font-weight: 400; color: var(--text-2); }
.cal .win { color: var(--text-2); margin-left: auto; font-family: var(--mono); font-size: 0.74rem; white-space: nowrap; }

/* Agent brief */
.brief-meta { font-family: var(--mono); font-size: 0.74rem; color: var(--text-2); margin-bottom: 10px; }
.brief-draft { background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; font-size: 0.86rem; white-space: pre-wrap; line-height: 1.55; }
.opp { border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; margin-top: 8px; font-size: 0.8rem; }
.opp .t a { color: var(--text); font-weight: 600; text-decoration: none; }
.opp .t a:hover { text-decoration: underline; }
.opp .why { color: var(--text-2); margin-top: 2px; }
.opp details { margin-top: 6px; }
.opp summary { cursor: pointer; color: var(--text-3); font-size: 0.75rem; }
.opp .reply { white-space: pre-wrap; color: var(--text-2); margin-top: 6px; background: var(--panel-2); border-radius: 6px; padding: 8px 10px; }
.notes { font-size: 0.8rem; color: var(--text-2); margin-top: 12px; border-left: 2px solid var(--accent); padding-left: 10px; }

/* Creative studio */
.cre-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 12px; background: var(--panel-2); }
.cre-card img { display: block; width: 100%; }
.cre-card .meta { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.cre-card .meta .t { font-size: 0.84rem; font-weight: 600; }
.cre-card .meta .u { font-size: 0.74rem; color: var(--text-3); margin-top: 2px; }
table.shots { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 8px; }
table.shots td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
table.shots tr:last-child td { border-bottom: none; }
table.shots td.t { font-family: var(--mono); color: var(--accent); white-space: nowrap; }
table.shots td.ov { color: var(--text-2); font-style: italic; white-space: nowrap; }

.err { color: #c0392b; font-size: 0.82rem; }

/* Starter pack */
.starter { margin-bottom: 14px; }
.starter .row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
  margin-top: 8px; background: var(--panel);
}
.starter .row.done { opacity: 0.45; }
.starter .row .chip {
  flex: none; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--accent); border: 1px solid var(--border); border-radius: 999px; padding: 3px 10px; background: var(--panel-2);
}
.starter .row .what { flex: 1; min-width: 0; }
.starter .row .what .l { font-size: 0.86rem; font-weight: 600; }
.starter .row .what .p { font-size: 0.76rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.starter .row .win { font-family: var(--mono); font-size: 0.7rem; color: var(--text-3); white-space: nowrap; }
.loading { color: var(--text-3); font-size: 0.82rem; }
.spacer { height: 14px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import htm from 'https://esm.sh/htm';

const h = htm.bind(React.createElement);
const REPO = 'vineetu/JOT-Transcribe';
const SITE = 'https://jot-transcribe.com/';

// ── GitHub metrics ──
function useGitHub() {
  const [data, setData] = useState({ loading: true });
  useEffect(() => {
    Promise.all([
      fetch(`https://api.github.com/repos/${REPO}`).then(r => r.json()),
      fetch(`https://api.github.com/repos/${REPO}/releases?per_page=30`).then(r => r.json()),
    ]).then(([repo, releases]) => {
      if (!Array.isArray(releases)) throw new Error(releases.message || repo.message || 'GitHub API error');
      const rows = releases.map(r => ({
        tag: r.tag_name,
        date: (r.published_at || '').slice(0, 10),
        downloads: (r.assets || []).reduce((s, a) => s + (a.download_count || 0), 0),
      }));
      setData({
        loading: false,
        stars: repo.stargazers_count,
        forks: repo.forks_count,
        watchers: repo.subscribers_count,
        latest: rows[0],
        total: rows.reduce((s, r) => s + r.downloads, 0),
        rows,
      });
    }).catch(e => setData({ loading: false, error: String(e.message || e) }));
  }, []);
  return data;
}

// ── Marketing agent data (committed daily to marketing/data/ by the cloud routine) ──
const RAW = `https://raw.githubusercontent.com/${REPO}/main/marketing/data/`;
function useMarketing() {
  const [data, setData] = useState({ loading: true });
  useEffect(() => {
    const get = f => fetch(RAW + f, { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null);
    Promise.all([get('snapshots.json'), get('brief.json'), get('starter-pack.json'), get('appstore.json')])
      .then(([snaps, brief, starter, appstore]) => setData({ loading: false, snaps, brief, starter, appstore }));
  }, []);
  return data;
}

function paceFrom(snaps) {
  if (!Array.isArray(snaps) || snaps.length < 2) return null;
  const last = snaps[snaps.length - 1];
  const base = snaps[Math.max(0, snaps.length - 8)];
  const days = Math.max(1, (Date.parse(last.date) - Date.parse(base.date)) / 86400000);
  return (last.total - base.total) / days;
}

function Stat({ label, value, sub }) {
  return h`<div class="panel stat">
    <h2><span class="dot"></span>${label}</h2>
    <div class="big">${value ?? '—'}</div>
    ${sub && h`<div class="sub">${sub}</div>`}
  </div>`;
}

function Releases({ gh }) {
  if (gh.loading) return h`<div class="panel"><h2>Downloads by release</h2><div class="loading">Loading from GitHub…</div></div>`;
  if (gh.error) return h`<div class="panel"><h2>Downloads by release</h2><div class="err">${gh.error}</div></div>`;
  const max = Math.max(1, ...gh.rows.map(r => r.downloads));
  return h`<div class="panel">
    <h2><span class="dot"></span>Downloads by release</h2>
    <table class="releases">
      <thead><tr><th>Release</th><th>Date</th><th style=${{textAlign:'right'}}>DMG downloads</th></tr></thead>
      <tbody>
        ${gh.rows.map(r => h`<tr key=${r.tag}>
          <td>${r.tag}<div class="bar"><i style=${{ width: (100 * r.downloads / max) + '%' }}></i></div></td>
          <td style=${{color:'var(--text-2)'}}>${r.date}</td>
          <td class="num">${r.downloads.toLocaleString()}</td>
        </tr>`)}
      </tbody>
    </table>
    <div class="hint">Live from the GitHub API — every DMG pulled through the website lands here. Tag releases with UTM-tracked posts to attribute spikes.</div>
  </div>`;
}

// ── Creative studio ──
const RAWROOT = `https://raw.githubusercontent.com/${REPO}/main/`;

async function rasterize(url, scale = 2) {
  const svg = await fetch(url, { cache: 'no-store' }).then(r => r.text());
  const blobUrl = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
  try {
    const img = new Image();
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = blobUrl; });
    const c = document.createElement('canvas');
    c.width = img.naturalWidth * scale; c.height = img.naturalHeight * scale;
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    return { data: c.toDataURL('image/png'), w: c.width, h: c.height };
  } finally { URL.revokeObjectURL(blobUrl); }
}

async function downloadPng(file) {
  const png = await rasterize(RAWROOT + file);
  const a = document.createElement('a');
  a.href = png.data;
  a.download = file.split('/').pop().replace(/\.svg$/, '.png');
  a.click();
}

async function downloadPdf(files, name) {
  const { jsPDF } = await import('https://esm.sh/jspdf@2.5.1');
  let doc;
  for (const f of files) {
    const png = await rasterize(RAWROOT + f);
    const fmt = [png.w, png.h], ori = png.h >= png.w ? 'portrait' : 'landscape';
    if (!doc) doc = new jsPDF({ orientation: ori, unit: 'px', format: fmt, hotfixes: ['px_scaling'] });
    else doc.addPage(fmt, ori);
    doc.addImage(png.data, 'PNG', 0, 0, png.w, png.h);
  }
  doc.save(name);
}

function CreativeStudio({ m }) {
  const [busy, setBusy] = useState('');
  const run = (key, fn) => { setBusy(key); fn().catch(e => alert('Export failed: ' + e)).finally(() => setBusy('')); };
  let body;
  if (m.loading) {
    body = h`<div class="loading">Loading…</div>`;
  } else if (!m.brief?.creative) {
    body = h`<div class="hint" style=${{ marginTop: 0 }}>
      No visuals yet for today. The agent delivers cards, carousels, and a video storyboard
      with every morning brief — they appear here with one-click PNG / PDF export.
    </div>`;
  } else {
    const c = m.brief.creative;
    const slides = (c.carousel || []).map(s => (typeof s === 'string' ? s : s.file));
    body = h`<div>
      ${c.concept && h`<div class="hint" style=${{ marginTop: 0 }}>${c.concept}</div>`}
      ${(c.cards || []).map(card => h`<div class="cre-card" key=${card.file}>
        <img src=${RAWROOT + card.file} alt=${card.title} />
        <div class="meta">
          <div>
            <div class="t">${card.title}</div>
            <div class="u">${card.use}</div>
          </div>
          <button class="btn" disabled=${busy === card.file} onClick=${() => run(card.file, () => downloadPng(card.file))}>
            ${busy === card.file ? 'Exporting…' : 'PNG ↓'}
          </button>
        </div>
      </div>`)}
      ${slides.length > 0 && h`<div class="cre-card">
        <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(110px, 1fr))', gap: '6px', padding: '10px' }}>
          ${slides.map(f => h`<img key=${f} src=${RAWROOT + f} style=${{ borderRadius: '6px', border: '1px solid var(--border)' }} />`)}
        </div>
        <div class="meta">
          <div><div class="t">Carousel · ${slides.length} slides</div><div class="u">Post as a LinkedIn document (PDF) — carousels get the highest dwell time of any format</div></div>
          <button class="btn" disabled=${busy === 'pdf'} onClick=${() => run('pdf', () => downloadPdf(slides, `jot-carousel-${m.brief.date}.pdf`))}>
            ${busy === 'pdf' ? 'Building…' : 'PDF ↓'}
          </button>
        </div>
      </div>`}
      ${c.storyboard && h`<div style=${{ marginTop: '14px' }}>
        <div style=${{ fontSize: '0.84rem', fontWeight: 600 }}>🎬 ${c.storyboard.title} <span style=${{ color: 'var(--text-3)', fontWeight: 400 }}>· ${c.storyboard.duration_s}s · ${c.storyboard.use}</span></div>
        <table class="shots"><tbody>
          ${(c.storyboard.shots || []).map((s, i) => h`<tr key=${i}>
            <td class="t">${s.t}</td><td>${s.visual}</td><td class="ov">${s.overlay}</td>
          </tr>`)}
        </tbody></table>
        <div class="hint">Record once with QuickTime (⌘⇧5), trim to the shot list — this one clip covers the Reel, X video, and a GIF.</div>
      </div>`}
    </div>`;
  }
  return h`<div class="panel"><h2><span class="dot"></span>Creative studio</h2>${body}</div>`;
}

// ── Starter pack ──
function StarterPack({ m }) {
  const [done, setDone] = useState(() => JSON.parse(localStorage.getItem('jot-starter') || '{}'));
  const [copied, setCopied] = useState('');
  if (m.loading || !m.starter) return null;
  const s = m.starter;
  const items = s.items || [];
  const left = items.filter(i => !done[i.id]).length;
  if (left === 0) return null;
  const toggle = id => { const d = { ...done, [id]: !done[id] }; setDone(d); localStorage.setItem('jot-starter', JSON.stringify(d)); };
  const copy = it => {
    navigator.clipboard.writeText(it.text).then(() => { setCopied(it.id); setTimeout(() => setCopied(''), 1500); });
  };
  return h`<div class="panel starter">
    <h2><span class="dot"></span>${s.title} · ${left} left</h2>
    <div class="hint" style=${{ marginTop: 0 }}>${s.subtitle}</div>
    ${items.map(it => h`<div key=${it.id} class=${'row' + (done[it.id] ? ' done' : '')}>
      <input type="checkbox" checked=${!!done[it.id]} onChange=${() => toggle(it.id)} />
      <span class="chip">${CHANNELS[it.channel]?.name || it.channel}</span>
      <div class="what">
        <div class="l">${it.label}</div>
        <div class="p" title=${it.note}>${it.text.split('\n')[0]}</div>
      </div>
      <span class="win">${it.window}</span>
      <button class="btn ghost" onClick=${() => copy(it)}>${copied === it.id ? '✓' : 'Copy'}</button>
      ${it.attach && it.attach !== 'storyboard' && h`<button class="btn ghost" onClick=${() => downloadPng(it.attach)}>PNG</button>`}
      ${CHANNELS[it.channel] && h`<a class="btn" href=${CHANNELS[it.channel].share(`${SITE}?utm_source=${it.channel}&utm_medium=social&utm_campaign=starter-${it.id}`, it.text)} target="_blank" rel="noopener">Open →</a>`}
    </div>`)}
  </div>`;
}

// ── Agent brief ──
function loadDraft(d) {
  localStorage.setItem('jot-draft-live', d.text);
  window.dispatchEvent(new CustomEvent('jot-load-draft', { detail: d }));
}

function AgentBrief({ m }) {
  let body;
  if (m.loading) {
    body = h`<div class="loading">Loading agent data…</div>`;
  } else if (!m.brief) {
    body = h`<div class="hint" style=${{ marginTop: 0 }}>
      No brief yet. The marketing agent runs every morning at <b>5:30am PT</b> — it snapshots
      downloads, sweeps Reddit/HN for threads worth answering, writes ready-to-post content for
      LinkedIn, X, Reddit, and Instagram, and commits it all to <code>marketing/data/brief.json</code>.
      This panel reads that file live, and the same brief lands in your Gmail drafts.
      Nothing is ever posted without you.
    </div>`;
  } else {
    const b = m.brief;
    const dl = b.downloads || {};
    const posts = b.drafts || (b.draft ? [b.draft] : []);
    body = h`<div>

      ${(b.opportunities || []).map((o, i) => h`<div class="opp" key=${i}>
        <div class="t"><a href=${o.url} target="_blank" rel="noopener">${o.title}</a></div>

      </div>`)}
      ${b.notes && h`<div class="notes">${b.notes}</div>`}
    </div>`;
  }
  return h`<div class="panel"><h2><span class="dot"></span>${"Today's brief — from the agent"}</h2>${body}</div>`;
}

const GC_TOKEN = '10yb3d8m962yl64v9aqp9uogh3mzcsjk8ndmo1h7n9itmb05jw';
const GC_BASE  = 'https://jot-transcribe.goatcounter.com/api/v0';

function useGoatCounter() {
  const [data, setData] = React.useState({ loading: true });
  React.useEffect(() => {
    const end   = new Date().toISOString().slice(0, 10);
    const start = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);
    const q     = `?start=${start}&end=${end}`;
    const hdr   = { Authorization: `Bearer ${GC_TOKEN}` };
    const gc    = url => fetch(GC_BASE + url, { headers: hdr }).then(r => r.json());
    const delay = ms => new Promise(r => setTimeout(r, ms));
    (async () => {
      try {
        const total    = await gc('/stats/total'    + q); await delay(300);
        const hits     = await gc('/stats/hits'     + q + '&limit=10'); await delay(300);
        const browsers = await gc('/stats/browsers' + q); await delay(300);
        const systems  = await gc('/stats/systems'  + q); await delay(300);
        const sizes    = await gc('/stats/sizes'    + q); await delay(300);
        const langs    = await gc('/stats/languages'+ q);
        setData({ loading: false, total, hits, browsers, systems, sizes, langs });
      } catch(e) {
        setData({ loading: false, error: String(e.message || e) });
      }
    })();
  }, []);
  return data;
}

function GCBar({ label, count, max, color }) {
  const pct = max > 0 ? Math.round((count / max) * 100) : 0;
  return h`<div style=${{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'5px' }}>
    <div style=${{ width:'130px', fontSize:'0.78rem', color:'var(--text-2)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', flexShrink:0 }}>${label}</div>
    <div style=${{ flex:1, height:'7px', background:'var(--panel-2)', borderRadius:'4px', overflow:'hidden', border:'1px solid var(--border)' }}>
      <div style=${{ width:pct+'%', height:'100%', background:color||'var(--wave)', borderRadius:'4px', transition:'width 0.4s' }}></div>
    </div>
    <div style=${{ width:'24px', textAlign:'right', fontSize:'0.78rem', color:'var(--text-3)', fontFamily:'var(--mono)' }}>${count}</div>
  </div>`;
}

const SIZE_NAMES = { phone:'Phone', tablet:'Tablet / Large Phone', desktop:'Desktop', desktophd:'HD Monitor', unknown:'Unknown' };

function Traffic() {
  const gc = useGoatCounter();

  if (gc.loading) return h`<div class="panel"><h2><span class="dot"></span>Site traffic</h2><div class="loading">Loading from GoatCounter…</div></div>`;
  if (gc.error)   return h`<div class="panel"><h2><span class="dot"></span>Site traffic</h2><div class="err">${gc.error}</div></div>`;

  const { total, hits, browsers, systems, sizes, langs } = gc;
  const dailyData  = total.stats.map(s => s.daily);
  const maxDaily   = Math.max(...dailyData, 1);
  const nonZero    = total.stats.filter(s => s.daily > 0);
  const avgPerDay  = nonZero.length > 0 ? (total.total / nonZero.length).toFixed(1) : '0';
  const topPages   = hits.hits || [];
  const maxPage    = Math.max(...topPages.map(p => p.count), 1);
  const maxBrowser = Math.max(...(browsers.stats||[]).map(b => b.count), 1);
  const maxSystem  = Math.max(...(systems.stats||[]).map(s => s.count), 1);
  const activeSz   = (sizes.stats||[]).filter(s => s.count > 0);
  const maxSize    = Math.max(...activeSz.map(s => s.count), 1);
  const allLangs   = langs.stats || [];
  const maxLang    = Math.max(...allLangs.map(l => l.count), 1);

  return h`<div>
    <div style=${{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'10px', marginBottom:'10px' }}>
      <div class="panel stat"><h2><span class="dot"></span>Total views</h2><div class="big">${total.total}</div><div class="sub">last 30 days</div></div>
      <div class="panel stat"><h2><span class="dot"></span>Active days</h2><div class="big">${nonZero.length}</div><div class="sub">days with visits</div></div>
      <div class="panel stat"><h2><span class="dot"></span>Avg / active day</h2><div class="big">${avgPerDay}</div><div class="sub">views per day</div></div>
    </div>
    <div class="panel" style=${{ marginBottom:'10px' }}>
      <h2><span class="dot"></span>Daily views — last 30 days</h2>
      <div style=${{ display:'flex', alignItems:'flex-end', gap:'2px', height:'52px' }}>
        ${dailyData.map((v, i) => {
          const barH = Math.max(Math.round((v / maxDaily) * 48), v > 0 ? 3 : 0);
          const isToday = i === dailyData.length - 1;
          return h`<div key=${i} title=${total.stats[i]?.day + ': ' + v + ' views'}
            style=${{ flex:1, height:barH+'px', background: isToday ? '#CE231D' : (v > 0 ? '#1496F0' : 'var(--border)'), borderRadius:'2px 2px 0 0', cursor:'default' }}
          ></div>`;
        })}
      </div>
      <div style=${{ display:'flex', justifyContent:'space-between', marginTop:'4px' }}>
        <span style=${{ fontSize:'0.7rem', color:'var(--text-3)', fontFamily:'var(--mono)' }}>${total.stats[0]?.day}</span>
        <span style=${{ fontSize:'0.7rem', color:'var(--text-3)', fontFamily:'var(--mono)' }}>${total.stats[total.stats.length-1]?.day}</span>
      </div>
    </div>
    <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'10px' }}>
      <div class="panel"><h2><span class="dot"></span>Top pages</h2>
        ${topPages.map(p => h`<${GCBar} key=${p.path} label=${p.path||'/'} count=${p.count} max=${maxPage} color="var(--wave)" />`)}
      </div>
      <div class="panel"><h2><span class="dot"></span>Browsers</h2>
        ${(browsers.stats||[]).map(b => h`<${GCBar} key=${b.id} label=${b.name} count=${b.count} max=${maxBrowser} color="var(--wave)" />`)}
      </div>
    </div>
    <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'10px' }}>
      <div class="panel"><h2><span class="dot"></span>Operating systems</h2>
        ${(systems.stats||[]).map(s => h`<${GCBar} key=${s.id} label=${s.name} count=${s.count} max=${maxSystem} color="var(--green)" />`)}
      </div>
      <div class="panel"><h2><span class="dot"></span>Screen sizes</h2>
        ${activeSz.map(s => h`<${GCBar} key=${s.id} label=${SIZE_NAMES[s.id]||s.id} count=${s.count} max=${maxSize} color="var(--accent)" />`)}
      </div>
    </div>
    <div class="panel">
      <h2><span class="dot"></span>Languages</h2>
      ${allLangs.map(l => h`<${GCBar} key=${l.id} label=${l.name||l.id||'Unknown'} count=${l.count} max=${maxLang} color="#9a6cf0" />`)}
      <div class="hint" style=${{ marginTop:'10px' }}><a href="https://jot-transcribe.goatcounter.com/" target="_blank" rel="noopener">Open full GoatCounter dashboard →</a></div>
    </div>
  </div>`;
}

      <${Stat} label="GitHub stars" value=${gh.loading ? '…' : gh.stars?.toLocaleString()} sub=${gh.forks != null ? `${gh.forks} forks` : ''} />
      <${Stat} label="App Store (iOS)"
        value=${mk.loading ? '…' : mk.appstore?.installs != null ? mk.appstore.installs.toLocaleString() : (mk.appstore?.ratingCount ?? 0) + '★'}
        sub=${mk.appstore?.installs != null ? 'installs · run the local fetcher to refresh' : (mk.appstore ? `${mk.appstore.ratingCount} ratings · installs need API key` : 'iOS app')} />
    </div>

    <nav class="tabs">
      ${Object.entries(TABS).map(([k, t]) => h`<button key=${k} class=${tab === k ? 'active' : ''} onClick=${() => go(k)}>${t.label}</button>`)}
    </nav>
    <div class="section-sub">${TABS[tab].sub}</div>

    ${tab === 'today' && h`<div>
      <${StarterPack} m=${mk} />
      <div class="cols">
        <div>
          <${AgentBrief} m=${mk} />
        </div>
        <div>
          <${CreativeStudio} m=${mk} />
          <div class="spacer"></div>
          <${Composer} />
          <div class="spacer"></div>
          <${PublishCalendar} />
        </div>
      </div>
    </div>`}

    ${tab === 'growth' && h`<div class="cols">
      <div>
        <${Durable} />
        <div class="spacer"></div>
        <${CardPreview} />
      </div>
      <div>
        <${Playbook} />
      </div>
    </div>`}

    ${tab === 'analytics' && h`<div class="cols">
      <div>
        <${Releases} gh=${gh} />
        <div class="spacer"></div>
        <${AppStore} m=${mk} />
      </div>
      <div>
        <${Traffic} />
      </div>
    </div>`}
  </div>`;
}

createRoot(document.getElementById('root')).render(h`<${App} />`);
</script>
</body>
</html>
