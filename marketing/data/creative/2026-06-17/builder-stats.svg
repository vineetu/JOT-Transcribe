  <!-- Day counter -->
  <text x="540" y="222" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="38" fill="#9a9a9f">Day 62.</text>

  <!-- BIG number -->
  <text x="540" y="508" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="296" font-weight="700" fill="#f0f0f0">142</text>

  <!-- Downloads label -->
  <text x="540" y="584" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="38" fill="#9a9a9f" letter-spacing="10">DOWNLOADS</text>

  <!-- Divider -->
  <line x1="160" y1="644" x2="920" y2="644" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Stat col 1: 27 releases -->
  <text x="270" y="726" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#f0f0f0">27</text>
  <text x="270" y="768" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="24" fill="#9a9a9f">releases</text>

  <!-- Stat col 2: $0 raised (accent red) -->
  <text x="540" y="726" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#CE231D">$0</text>
  <text x="540" y="768" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="24" fill="#9a9a9f">raised</text>

  <!-- Stat col 3: 1 builder -->
  <text x="810" y="726" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
