<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#0d0d0e"/>
  <rect x="60" y="60" width="960" height="1230" rx="18" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Header: also includes... -->
  <text x="540" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" letter-spacing="2" fill="#9a9a9f">ALSO: emails · PR descriptions · journal entries</text>
  <line x1="100" y1="160" x2="980" y2="160" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Big CTA words -->
  <text x="540" y="378" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="112" font-weight="900" fill="#f0f0f0">Free.</text>
  <text x="540" y="504" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="112" font-weight="900" fill="#f0f0f0">On-device.</text>
  <text x="540" y="630" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="112" font-weight="900" fill="#CE231D">Now.</text>

  <!-- Supporting -->
  <text x="540" y="718" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#9a9a9f">Open source · Apple Silicon · No account</text>

  <!-- CTA button -->
  <rect x="190" y="768" width="700" height="80" rx="40" fill="#CE231D"/>
  <text x="540" y="818" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#f0f0f0">jot-transcribe.com</text>

  <!-- iOS note -->
  <text x="540" y="918" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#9a9a9f">Also on iOS — search Jot Transcribe</text>

  <!-- Bottom divider and footer -->
  <line x1="100" y1="1168" x2="980" y2="1168" stroke="#2a2a2e" stroke-width="1"/>
  <circle cx="424" cy="1222" r="6" fill="#CE231D"/>
  <text x="440" y="1228" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#9a9a9f">jot-transcribe.com</text>
