<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#0d0d0e"/>
  <rect x="60" y="60" width="960" height="960" rx="18" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Brand label -->
  <text x="540" y="148" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" letter-spacing="6" fill="#9a9a9f">JOT</text>
  <line x1="100" y1="170" x2="980" y2="170" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Three red zeros -->
  <text x="220" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="200" font-weight="900" fill="#CE231D">0</text>
  <text x="540" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="200" font-weight="900" fill="#CE231D">0</text>
  <text x="860" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="200" font-weight="900" fill="#CE231D">0</text>

  <!-- Labels under zeros -->
  <text x="220" y="472" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#f0f0f0">servers</text>
  <text x="540" y="472" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#f0f0f0">accounts</text>
  <text x="860" y="472" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#f0f0f0">dollars</text>

  <line x1="100" y1="512" x2="980" y2="512" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Main claim -->
  <text x="540" y="612" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#f0f0f0">Your voice never</text>
  <text x="540" y="682" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#f0f0f0">leaves your Mac.</text>

  <!-- Supporting text -->
  <text x="540" y="766" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#9a9a9f">On-device · Apple Neural Engine · Free · Open source</text>
  <text x="540" y="836" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#9a9a9f">Apple Silicon · macOS 14+ · No account</text>

  <!-- Bottom divider and footer -->
  <line x1="100" y1="916" x2="980" y2="916" stroke="#2a2a2e" stroke-width="1"/>
  <circle cx="424" cy="966" r="6" fill="#CE231D"/>
  <text x="440" y="972" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#9a9a9f">jot-transcribe.com</text>
</svg>
