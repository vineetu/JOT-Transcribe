<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">

  <!-- background -->
  <rect width="1080" height="1080" fill="#0d0d0e"/>

  <!-- headline: 3 lines, big type -->
  <text x="540" y="96"  text-anchor="middle" font-size="42" font-weight="800" fill="#9a9a9f" letter-spacing="-1">COMMIT MESSAGES</text>
  <text x="540" y="150" text-anchor="middle" font-size="42" font-weight="800" fill="#f0f0f0" letter-spacing="-1">TELL YOUR FUTURE SELF</text>
  <text x="540" y="204" text-anchor="middle" font-size="42" font-weight="800" fill="#CE231D" letter-spacing="-1">WHAT ACTUALLY HAPPENED.</text>

  <!-- LEFT PANEL: typed commit -->
  <rect x="52" y="236" width="462" height="640" fill="#161618" rx="18" stroke="#2a2a2e" stroke-width="1"/>

  <!-- label -->
  <text x="283" y="286" text-anchor="middle" font-size="14" font-weight="600" fill="#9a9a9f" letter-spacing="2">TYPED</text>

  <!-- terminal block -->
  <rect x="76"  y="306" width="414" height="116" fill="#0d0d0e" rx="10"/>
  <text x="98"  y="344" font-size="13" fill="#9a9a9f" font-family="Courier New, monospace">$ git commit -m "</text>
  <text x="98"  y="398" font-size="44" font-weight="700" fill="#9a9a9f" font-family="Courier New, monospace">fix bug"</text>

  <!-- stat -->
  <text x="283" y="488" text-anchor="middle" font-size="72" font-weight="800" fill="#9a9a9f">2</text>
  <text x="283" y="530" text-anchor="middle" font-size="18" fill="#9a9a9f">words</text>

  <line x1="76" y1="560" x2="490" y2="560" stroke="#2a2a2e" stroke-width="1"/>

  <text x="283" y="606" text-anchor="middle" font-size="16" fill="#9a9a9f">Future you opens git log.</text>
  <text x="283" y="634" text-anchor="middle" font-size="16" fill="#9a9a9f">Future you is confused.</text>

  <text x="283" y="812" text-anchor="middle" font-size="20" fill="#9a9a9f">5 sec of avoiding the keyboard</text>

  <!-- RIGHT PANEL: spoken commit -->
  <rect x="566" y="236" width="462" height="640" fill="#161618" rx="18" stroke="#2a2a2e" stroke-width="1"/>

  <!-- label -->
  <text x="797" y="286" text-anchor="middle" font-size="14" font-weight="600" fill="#CE231D" letter-spacing="2">SPOKEN WITH JOT</text>

  <!-- terminal block -->
  <rect x="590" y="306" width="414" height="156" fill="#0d0d0e" rx="10"/>
  <text x="612" y="344" font-size="13" fill="#9a9a9f" font-family="Courier New, monospace">$ git commit -m "</text>
  <text x="612" y="376" font-size="18" font-weight="600" fill="#f0f0f0" font-family="Courier New, monospace">fix null deref when audio</text>
  <text x="612" y="402" font-size="18" font-weight="600" fill="#f0f0f0" font-family="Courier New, monospace">device disconnects mid-</text>
  <text x="612" y="428" font-size="18" font-weight="600" fill="#f0f0f0" font-family="Courier New, monospace">session on Apple Silicon"</text>

  <!-- stat -->
  <text x="797" y="488" text-anchor="middle" font-size="72" font-weight="800" fill="#CE231D">13</text>
  <text x="797" y="530" text-anchor="middle" font-size="18" fill="#f0f0f0">words</text>

  <line x1="590" y1="560" x2="1004" y2="560" stroke="#2a2a2e" stroke-width="1"/>

  <text x="797" y="606" text-anchor="middle" font-size="16" fill="#f0f0f0">Future you opens git log.</text>
  <text x="797" y="634" text-anchor="middle" font-size="16" fill="#f0f0f0">Future you says "got it."</text>

  <text x="797" y="812" text-anchor="middle" font-size="20" fill="#CE231D">4 sec of speaking naturally</text>

  <!-- sub-cta -->
  <text x="540" y="936" text-anchor="middle" font-size="22" fill="#9a9a9f">⌥ Space  ·  speak  ·  text at cursor  ·  free</text>

  <!-- footer -->
  <circle cx="424" cy="1012" r="6" fill="#CE231D"/>
  <text x="444" y="1020" font-size="20" fill="#9a9a9f" font-weight="500">jot-transcribe.com</text>

</svg>
