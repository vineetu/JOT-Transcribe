<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#0d0d0e"/>

  <!-- Slide counter -->
  <text x="1020" y="54" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#9a9a9f">2 / 5</text>

  <!-- Number badge -->
  <circle cx="100" cy="130" r="44" fill="#CE231D"/>
  <text x="100" y="143" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="bold" fill="#f0f0f0">1</text>

  <!-- Point -->
  <text x="100" y="260" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="#f0f0f0">Your voice</text>
  <text x="100" y="330" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="#f0f0f0">travels to</text>
  <text x="100" y="400" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="#CE231D">servers you</text>
  <text x="100" y="470" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="#CE231D">don't control.</text>

  <!-- Divider -->
  <line x1="60" y1="520" x2="1020" y2="520" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Explanation panel -->
  <rect x="60" y="550" width="960" height="620" rx="18" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Flow diagram -->
  <text x="540" y="640" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#9a9a9f">HOW CLOUD DICTATION WORKS</text>

  <!-- Steps row -->
  <rect x="80" y="680" width="200" height="70" rx="10" fill="#0d0d0e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="180" y="712" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#f0f0f0">Your voice</text>
  <text x="180" y="734" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#9a9a9f">on your Mac</text>

  <text x="305" y="720" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#CE231D">→</text>

  <rect x="330" y="680" width="200" height="70" rx="10" fill="#0d0d0e" stroke="#CE231D" stroke-width="1"/>
  <text x="430" y="712" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#CE231D">Internet</text>
  <text x="430" y="734" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#9a9a9f">encrypted?</text>

  <text x="555" y="720" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#CE231D">→</text>

  <rect x="580" y="680" width="200" height="70" rx="10" fill="#0d0d0e" stroke="#CE231D" stroke-width="1"/>
  <text x="680" y="712" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#CE231D">Their server</text>
  <text x="680" y="734" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#9a9a9f">foreign country?</text>

  <text x="805" y="720" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#CE231D">→</text>

  <rect x="830" y="680" width="190" height="70" rx="10" fill="#0d0d0e" stroke="#CE231D" stroke-width="1"/>
  <text x="925" y="712" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#CE231D">Transcript</text>
  <text x="925" y="734" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#9a9a9f">comes back</text>

  <!-- Description -->
  <text x="540" y="820" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#9a9a9f">Every spoken word — medical notes, passwords,</text>
  <text x="540" y="852" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#9a9a9f">work secrets, personal thoughts — passes through</text>
  <text x="540" y="884" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#9a9a9f">infrastructure you have no visibility into.</text>

  <text x="540" y="960" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#f0f0f0">You accepted this by default.</text>

  <!-- Footer note inside panel -->
  <text x="540" y="1100" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#9a9a9f">Most apps process audio in the cloud to improve their models.</text>

  <!-- Footer -->
  <circle cx="402" cy="1308" r="5" fill="#CE231D"/>
  <text x="418" y="1313" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#9a9a9f">jot-transcribe.com</text>
</svg>
