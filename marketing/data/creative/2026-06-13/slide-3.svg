<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#0d0d0e"/>

  <!-- Title -->
  <text x="72" y="110" font-family="Helvetica, Arial, sans-serif" font-size="50" font-weight="bold" fill="#f0f0f0">What stays on</text>
  <text x="72" y="174" font-family="Helvetica, Arial, sans-serif" font-size="50" font-weight="bold" fill="#f0f0f0">their servers</text>

  <!-- List items -->
  <rect x="72" y="220" width="936" height="84" rx="14" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>
  <circle cx="122" cy="262" r="9" fill="#CE231D"/>
  <text x="152" y="270" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#f0f0f0">Raw audio recordings of your voice</text>

  <rect x="72" y="320" width="936" height="84" rx="14" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>
  <circle cx="122" cy="362" r="9" fill="#CE231D"/>
  <text x="152" y="370" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#f0f0f0">Full transcripts of everything you said</text>

  <rect x="72" y="420" width="936" height="84" rx="14" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>
  <circle cx="122" cy="462" r="9" fill="#CE231D"/>
  <text x="152" y="470" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#f0f0f0">Timestamps and usage patterns</text>

  <rect x="72" y="520" width="936" height="84" rx="14" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>
  <circle cx="122" cy="562" r="9" fill="#CE231D"/>
  <text x="152" y="570" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#f0f0f0">Voice characteristics for identification</text>

  <rect x="72" y="620" width="936" height="84" rx="14" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>
  <circle cx="122" cy="662" r="9" fill="#9a9a9f"/>
  <text x="152" y="670" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#9a9a9f">For as long as their privacy policy allows</text>

  <!-- Callout -->
  <text x="72" y="820" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#9a9a9f">You said it. They stored it.</text>
  <text x="72" y="860" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#9a9a9f">Read the fine print.</text>

  <!-- Footer -->
  <circle cx="72" cy="1316" r="7" fill="#CE231D"/>
  <text x="92" y="1322" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#9a9a9f">jot-transcribe.com</text>
</svg>
