<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#0d0d0e"/>

  <!-- CTA heading -->
  <text x="540" y="300" font-family="Helvetica, Arial, sans-serif" font-size="88" font-weight="bold" fill="#f0f0f0" text-anchor="middle">Try Jot.</text>

  <text x="540" y="380" font-family="Helvetica, Arial, sans-serif" font-size="34" fill="#9a9a9f" text-anchor="middle">Free. Open source. On-device.</text>

  <!-- Feature list panel -->
  <rect x="72" y="430" width="936" height="440" rx="18" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>

  <text x="540" y="502" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#9a9a9f" text-anchor="middle">✓  Hotkey → speak → text at cursor in any app</text>
  <text x="540" y="556" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#9a9a9f" text-anchor="middle">✓  Transcription on the Apple Neural Engine</text>
  <text x="540" y="610" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#9a9a9f" text-anchor="middle">✓  No account. No subscription. No telemetry.</text>
  <text x="540" y="664" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#9a9a9f" text-anchor="middle">✓  AI rewrite via Apple Intelligence</text>
  <text x="540" y="718" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#9a9a9f" text-anchor="middle">✓  Voice never leaves your Mac</text>
  <text x="540" y="790" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#9a9a9f" text-anchor="middle">Apple Silicon · macOS 14+</text>

  <!-- URL -->
  <text x="540" y="1060" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="#f0f0f0" text-anchor="middle">jot-transcribe.com</text>

  <!-- Footer -->
  <circle cx="72" cy="1316" r="7" fill="#CE231D"/>
  <text x="92" y="1322" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#9a9a9f">jot-transcribe.com</text>
</svg>
