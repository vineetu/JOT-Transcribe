  <!-- Footer -->
  <circle cx="422" cy="1248" r="7" fill="#CE231D"/>
  <text x="440" y="1253" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#9a9a9f">jot-transcribe.com</text>
