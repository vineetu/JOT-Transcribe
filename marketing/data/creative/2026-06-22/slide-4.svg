<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350">
  <rect width="1080" height="1350" fill="#0d0d0e"/>
  <rect x="60" y="60" width="960" height="1230" rx="18" fill="#161618" stroke="#2a2a2e" stroke-width="1.5"/>

  <!-- Slide number -->
  <text x="540" y="174" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#9a9a9f" text-anchor="middle" letter-spacing="4">4 / 6</text>

  <!-- Big number -->
  <text x="540" y="570" font-family="Helvetica, Arial, sans-serif" font-size="220" font-weight="800" fill="#f0f0f0" text-anchor="middle">4</text>

  <!-- Label -->
